[workspace]
name = "gatk-variant-calling"
version = "0.1.0"
description = "GATK variant calling workflow with reproducible environment"
channels = ["conda-forge", "bioconda"]
platforms = ["linux-64"]

[dependencies]
bwa = "==0.7.19"
samtools = "==1.23"
gatk4 = "==4.6.2.0"
fastqc = "==0.12.1"
trim-galore = "==0.6.10"
bcftools = "==1.21"
bedtools = "==2.31.1"
snpeff = "==5.2"
htslib = "==1.23"
r-base = "==4.4.2"
curl = "8.*"
sra-tools = "*"